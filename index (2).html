<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0f1117"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Auditor Schedule</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a; --border:#2e3348;
    --accent:#4ade80; --accent2:#22c55e; --accent-dim:rgba(74,222,128,0.12);
    --text:#e8eaf0; --text-muted:#6b7280; --text-dim:#9ca3af;
    --off-red:#f87171; --office-green:#4ade80; --custom-orange:#fb923c;
    --row-alt:#1e2133; --header-bg:#131620;
    --yellow-row:rgba(250,204,21,0.08); --orange-row:rgba(251,146,60,0.1); --teal-row:rgba(34,211,238,0.08);
    --radius:10px; --shadow:0 4px 24px rgba(0,0,0,0.4);
  }
  body.light {
    --bg:#f4f6f9; --surface:#ffffff; --surface2:#eef1f6; --border:#d1d9e6;
    --accent:#16a34a; --accent2:#15803d; --accent-dim:rgba(22,163,74,0.1);
    --text:#111827; --text-muted:#6b7280; --text-dim:#9ca3af;
    --off-red:#dc2626; --office-green:#16a34a; --custom-orange:#ea580c;
    --row-alt:#f8fafc; --header-bg:#ffffff;
    --yellow-row:rgba(234,179,8,0.1); --orange-row:rgba(234,88,12,0.08); --teal-row:rgba(6,182,212,0.08);
    --shadow:0 4px 24px rgba(0,0,0,0.1);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;transition:background 0.25s,color 0.25s;overflow-x:hidden;}

  /* ── TOPBAR ── */
  .topbar{background:var(--header-bg);border-bottom:1px solid var(--border);padding:0 14px;height:52px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
  .topbar-logo{font-size:15px;font-weight:700;color:var(--accent);display:flex;align-items:center;gap:7px;white-space:nowrap;}
  .topbar-logo svg{width:18px;height:18px;flex-shrink:0;}
  .topbar-divider{width:1px;height:22px;background:var(--border);flex-shrink:0;}
  .schedule-label{font-size:12px;font-weight:500;color:var(--text-dim);background:var(--surface2);padding:3px 10px;border-radius:20px;border:1px solid var(--border);white-space:nowrap;}
  .topbar-spacer{flex:1;min-width:0;}
  .save-status{font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);white-space:nowrap;}
  .save-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);transition:background 0.3s;flex-shrink:0;}
  .save-dot.saving{background:var(--custom-orange);animation:pulse 1s infinite;}
  .save-dot.saved{background:var(--accent);}
  .save-dot.error{background:var(--off-red);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .theme-toggle{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px;gap:2px;flex-shrink:0;}
  .theme-btn{background:none;border:none;cursor:pointer;padding:4px 9px;border-radius:16px;font-size:11px;font-weight:600;color:var(--text-muted);font-family:'DM Sans',sans-serif;transition:all 0.2s;display:flex;align-items:center;gap:4px;}
  .theme-btn.active{background:var(--accent);color:#fff;}

  /* ── WEEK NAV ── */
  .week-nav{display:flex;align-items:center;gap:10px;padding:14px 14px 10px;}
  .nav-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:40px;height:40px;border-radius:9px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;touch-action:manipulation;}
  .nav-btn:active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
  .week-label{font-size:13px;font-weight:600;color:var(--text);cursor:pointer;padding:8px 12px;border-radius:9px;border:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;gap:7px;flex:1;justify-content:center;touch-action:manipulation;}
  .week-label:active{border-color:var(--accent);color:var(--accent);}
  .today-btn{background:none;border:1px solid var(--border);color:var(--text-muted);padding:8px 12px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;white-space:nowrap;touch-action:manipulation;}
  .today-btn:active{border-color:var(--accent);color:var(--accent);}

  /* ── LEGEND ── */
  .legend{display:flex;gap:12px;padding:0 14px 12px;flex-wrap:wrap;align-items:center;}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted);}
  .legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

  /* ── SCROLLABLE TABLE (works on both mobile and desktop) ── */
  .table-outer{padding:0 14px 40px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .schedule-table{border-collapse:separate;border-spacing:0;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;}

  /* Name column — sticky on left */
  .schedule-table th.col-name,
  .schedule-table td.col-name{
    position:sticky;left:0;z-index:5;
    background:var(--header-bg);
    min-width:130px;max-width:150px;width:140px;
  }
  .schedule-table td.col-name{
    background:var(--surface);
    font-size:12px;font-weight:600;color:var(--text);
    padding:10px 12px;border-right:2px solid var(--border);border-bottom:1px solid var(--border);
    vertical-align:middle;word-break:break-word;
  }
  /* Row colors propagate to sticky col */
  .row-yellow td.col-name{background:var(--yellow-row)!important;}
  .row-orange td.col-name{background:var(--orange-row)!important;}
  .row-teal   td.col-name{background:var(--teal-row)!important;}
  .row-alt    td.col-name{background:var(--row-alt)!important;}

  /* Header rows */
  .schedule-table thead tr:first-child th{
    background:var(--header-bg);font-size:10px;font-weight:700;letter-spacing:1px;
    text-transform:uppercase;color:var(--text-muted);padding:11px 8px;
    border-bottom:1px solid var(--border);text-align:center;white-space:nowrap;
  }
  .schedule-table thead tr:nth-child(2) th{
    background:var(--surface2);font-size:11px;font-weight:600;
    font-family:'DM Mono',monospace;color:var(--accent);padding:8px 8px;
    border-bottom:2px solid var(--border);text-align:center;cursor:pointer;white-space:nowrap;
  }
  .schedule-table thead tr:nth-child(2) th.col-name{color:var(--text-muted);text-align:left;padding-left:12px;cursor:default;}
  .schedule-table thead th.today-col{color:var(--accent);}
  .schedule-table thead tr:nth-child(2) th.today-col{background:var(--accent-dim);}

  /* Day columns — fixed width, comfortable for touch */
  .schedule-table th.col-day,
  .schedule-table td.col-day{width:100px;min-width:90px;}
  .schedule-table td.col-day{
    text-align:center;padding:3px;
    border-bottom:1px solid var(--border);border-right:1px solid var(--border);
    vertical-align:middle;
  }
  .schedule-table td.col-day.today-col{background:rgba(74,222,128,0.04);}
  .schedule-table tbody tr:last-child td{border-bottom:none;}

  /* Row colors */
  .row-yellow td{background:var(--yellow-row);}
  .row-orange td{background:var(--orange-row);}
  .row-teal   td{background:var(--teal-row);}
  .row-alt    td{background:var(--row-alt);}

  /* Cell input */
  .cell-input{
    width:100%;background:transparent;border:2px solid transparent;border-radius:6px;
    color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
    text-align:center;padding:8px 4px;cursor:pointer;transition:all 0.15s;outline:none;
    min-height:44px;touch-action:manipulation;
  }
  .cell-input:focus{border-color:var(--accent);background:var(--surface2);}
  .cell-input.status-off{color:var(--off-red);font-weight:700;}
  .cell-input.status-office{color:var(--office-green);}
  .cell-input.status-custom{color:var(--custom-orange);}

  /* ── QUICK PICK ── */
  .quick-pick{position:fixed;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:6px;z-index:300;display:none;flex-direction:column;gap:3px;min-width:140px;box-shadow:var(--shadow);}
  .quick-pick.visible{display:flex;}
  .qp-btn{background:none;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;padding:11px 14px;border-radius:6px;cursor:pointer;text-align:left;touch-action:manipulation;}
  .qp-btn:active{background:var(--accent-dim);}
  .qp-btn.opt-office{color:var(--office-green);}
  .qp-btn.opt-off{color:var(--off-red);}
  .qp-btn.opt-clear{color:var(--text-muted);}

  /* ── CALENDAR MODAL ── */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:500;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
  .modal-overlay.open{display:flex;}
  .calendar-modal{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;box-shadow:var(--shadow);animation:slideUp 0.25s ease;}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @media(min-width:600px){
    .modal-overlay{align-items:center;}
    .calendar-modal{border-radius:16px;width:340px;max-width:340px;}
  }
  .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .cal-month{font-size:16px;font-weight:700;color:var(--text);}
  .cal-nav{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
  .cal-nav:active{border-color:var(--accent);color:var(--accent);}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px;}
  .cal-day-label{text-align:center;font-size:10px;font-weight:700;color:var(--text-muted);padding:4px 0 8px;}
  .cal-day{text-align:center;padding:10px 4px;font-size:14px;border-radius:8px;cursor:pointer;color:var(--text-dim);touch-action:manipulation;}
  .cal-day:active{background:var(--accent-dim);color:var(--accent);}
  .cal-day.today{background:var(--accent);color:#0a0f0a;font-weight:700;}
  .cal-day.in-week{background:var(--accent-dim);color:var(--accent);}
  .cal-day.empty{pointer-events:none;}
  .cal-actions{display:flex;gap:10px;}
  .cal-cancel{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);padding:13px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;touch-action:manipulation;}
  .cal-apply{flex:2;background:var(--accent);border:none;color:#0a0f0a;padding:13px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;touch-action:manipulation;}
  .cal-apply:disabled{opacity:0.4;cursor:not-allowed;}

  /* ── TOAST ── */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:11px 18px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:var(--shadow);z-index:1000;opacity:0;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
  .toast.success{border-color:var(--accent);}
  .toast.error{border-color:var(--off-red);}

  /* ── LOADING ── */
  .loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity 0.4s;}
  .loading-overlay.hidden{opacity:0;pointer-events:none;}
  .spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-size:13px;color:var(--text-muted);}

  /* ── CONFIG SCREEN ── */
  .config-screen{position:fixed;inset:0;background:var(--bg);z-index:998;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:16px;}
  .config-screen.hidden{display:none;}
  .config-title{font-size:20px;font-weight:700;color:var(--text);}
  .config-sub{font-size:13px;color:var(--text-muted);text-align:center;max-width:360px;line-height:1.6;}
  .config-input{width:100%;max-width:400px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:12px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;}
  .config-input:focus{border-color:var(--accent);}
  .config-btn{background:var(--accent);border:none;color:#0a0f0a;padding:12px 24px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;width:100%;max-width:400px;}
  .config-btn:active{background:var(--accent2);}
  .config-logo{font-size:40px;margin-bottom:8px;}

  /* Responsive: on wider screens, give table more room */
  @media(min-width:600px){
    .schedule-table th.col-day,
    .schedule-table td.col-day{width:120px;min-width:110px;}
    .schedule-table td.col-name{min-width:160px;max-width:180px;width:170px;}
  }
</style>
</head>
<body>

<!-- Config screen (shown if no API URL saved) -->
<div class="config-screen" id="configScreen">
  <div class="config-logo">📅</div>
  <div class="config-title">Schedule Hub Setup</div>
  <div class="config-sub">Paste your Apps Script Web App URL below to connect to your Google Sheet data.</div>
  <input class="config-input" id="apiUrlInput" type="url" placeholder="https://script.google.com/macros/s/.../exec"/>
  <button class="config-btn" onclick="saveApiUrl()">Connect</button>
</div>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">Loading schedule…</div>
</div>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
    Schedule Hub
  </div>
  <div class="topbar-divider"></div>
  <div class="schedule-label">Auditor Schedule</div>
  <div class="topbar-spacer"></div>
  <div class="save-status">
    <div class="save-dot saved" id="saveDot"></div>
    <span id="saveText">Saved</span>
  </div>
  <div class="topbar-divider"></div>
  <div class="theme-toggle">
    <button class="theme-btn" id="btnDark" onclick="setTheme('dark')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      Dark
    </button>
    <button class="theme-btn" id="btnLight" onclick="setTheme('light')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      Light
    </button>
  </div>
</div>

<!-- Week Nav -->
<div class="week-nav">
  <button class="nav-btn" onclick="changeWeek(-1)">&#8592;</button>
  <div class="week-label" onclick="openCalendar()" id="weekLabel">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14" style="flex-shrink:0">
      <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
    <span id="weekLabelText">Loading…</span>
  </div>
  <button class="nav-btn" onclick="changeWeek(1)">&#8594;</button>
  <button class="today-btn" onclick="goToToday()">Today</button>
</div>

<!-- Legend -->
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--office-green)"></div>OFFICE</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--off-red)"></div>OFF</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--custom-orange)"></div>Custom</div>
  <div class="legend-item" style="font-size:10px;color:var(--text-muted)">Tap cell to edit · Tap week to change</div>
</div>

<!-- Schedule Table -->
<div class="table-outer">
  <table class="schedule-table">
    <thead>
      <tr>
        <th class="col-name">AUDITOR</th>
        <th class="col-day" id="h-mon">MON</th>
        <th class="col-day" id="h-tue">TUE</th>
        <th class="col-day" id="h-wed">WED</th>
        <th class="col-day" id="h-thu">THU</th>
        <th class="col-day" id="h-fri">FRI</th>
        <th class="col-day" id="h-sat">SAT</th>
        <th class="col-day" id="h-sun">SUN</th>
      </tr>
      <tr>
        <th class="col-name" onclick="openCalendar()" style="cursor:pointer;font-size:10px;padding-left:12px;">📅 Week</th>
        <th class="col-day date-th" data-day="mon" onclick="openCalendar()"></th>
        <th class="col-day date-th" data-day="tue" onclick="openCalendar()"></th>
        <th class="col-day date-th" data-day="wed" onclick="openCalendar()"></th>
        <th class="col-day date-th" data-day="thu" onclick="openCalendar()"></th>
        <th class="col-day date-th" data-day="fri" onclick="openCalendar()"></th>
        <th class="col-day date-th" data-day="sat" onclick="openCalendar()"></th>
        <th class="col-day date-th" data-day="sun" onclick="openCalendar()"></th>
      </tr>
    </thead>
    <tbody id="scheduleBody"></tbody>
  </table>
</div>

<!-- Calendar Modal -->
<div class="modal-overlay" id="calModal" onclick="handleModalClick(event)">
  <div class="calendar-modal">
    <div class="cal-header">
      <button class="cal-nav" onclick="calChangeMonth(-1)">&#8592;</button>
      <div class="cal-month" id="calMonthLabel"></div>
      <button class="cal-nav" onclick="calChangeMonth(1)">&#8594;</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="cal-actions">
      <button class="cal-cancel" onclick="closeCalendar()">Cancel</button>
      <button class="cal-apply" id="calApply" onclick="applyCalendar()" disabled>Apply Week</button>
    </div>
  </div>
</div>

<!-- Quick Pick -->
<div class="quick-pick" id="quickPick">
  <button class="qp-btn opt-office" onclick="setStatus('OFFICE')">✓ OFFICE</button>
  <button class="qp-btn opt-off"    onclick="setStatus('OFF')">✗ OFF</button>
  <button class="qp-btn"            onclick="setStatus('WFH')">⌂ WFH</button>
  <button class="qp-btn opt-clear"  onclick="setStatus('')">✕ Clear</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────
let API_URL = localStorage.getItem('apiUrl') || '';

function saveApiUrl() {
  const val = document.getElementById('apiUrlInput').value.trim();
  if (!val.startsWith('https://script.google.com')) {
    showToast('Please paste a valid Apps Script URL', 'error'); return;
  }
  API_URL = val;
  localStorage.setItem('apiUrl', val);
  document.getElementById('configScreen').classList.add('hidden');
  init();
}

// ── API CALLS ─────────────────────────────────────────────────
async function apiGet(params) {
  const url = API_URL + '?' + new URLSearchParams(params);
  const res = await fetch(url);
  return res.json();
}

// ── STATE ─────────────────────────────────────────────────────
const DAYS     = ['mon','tue','wed','thu','fri','sat','sun'];
const MONTHS   = ['January','February','March','April','May','June','July','August','September','October','November','December'];

let currentMonday  = getThisMonday(new Date());
let scheduleData   = {};
let auditors       = [];
let activeCell     = null;
let calViewYear, calViewMonth, calSelectedDate;

// ── INIT ─────────────────────────────────────────────────────
window.addEventListener('load', () => {
  setTheme(localStorage.getItem('scheduleTheme') || 'dark');
  if (!API_URL) {
    document.getElementById('loadingOverlay').classList.add('hidden');
    return;
  }
  document.getElementById('configScreen').classList.add('hidden');
  init();
});

async function init() {
  try {
    const res = await apiGet({ action: 'getAuditors' });
    auditors = res.data;
    buildTable();
    await loadCurrentWeek();
  } catch(e) {
    document.getElementById('loadingOverlay').classList.add('hidden');
    showToast('Connection error — check your API URL', 'error');
  }
}

// ── HELPERS ──────────────────────────────────────────────────
function getThisMonday(date) {
  const d = new Date(date); d.setHours(0,0,0,0);
  const day = d.getDay();
  d.setDate(d.getDate() + (day === 0 ? -6 : 1 - day));
  return d;
}
function isoDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function fmtDate(d)  { return (d.getMonth()+1) + '/' + d.getDate() + '/' + String(d.getFullYear()).slice(2); }
function fmtShort(d) { return (d.getMonth()+1) + '/' + d.getDate(); }
function isToday(d)  { const t=new Date(); return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate(); }

function getRowClass(a, idx) {
  if (a.color === '#FFF176') return 'row-yellow';
  if (a.color === '#FFCC80') return 'row-orange';
  if (a.color === '#80DEEA') return 'row-teal';
  if (idx % 2 === 1)         return 'row-alt';
  return '';
}

// ── BUILD TABLE ───────────────────────────────────────────────
function buildTable() {
  const tbody = document.getElementById('scheduleBody');
  tbody.innerHTML = '';
  auditors.forEach((a, idx) => {
    const tr = document.createElement('tr');
    const rc = getRowClass(a, idx);
    if (rc) tr.classList.add(rc);

    const nameTd = document.createElement('td');
    nameTd.className = 'col-name'; nameTd.textContent = a.name;
    tr.appendChild(nameTd);

    DAYS.forEach(day => {
      const td = document.createElement('td');
      td.className = 'col-day'; td.dataset.auditor = a.name; td.dataset.day = day;
      const input = makeInput(a.name, day);
      td.appendChild(input); tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

function makeInput(auditorName, day) {
  const input = document.createElement('input');
  input.type = 'text'; input.className = 'cell-input'; input.placeholder = '—';
  input.dataset.auditor = auditorName; input.dataset.day = day;
  input.addEventListener('focus', e => openQuickPick(input, e.target, auditorName, day));
  input.addEventListener('blur', () => {
    const val = input.value.trim().toUpperCase();
    input.value = val;
    commitCell(auditorName, day, val, input);
    setTimeout(() => {
      if (!document.getElementById('quickPick').contains(document.activeElement)) closeQuickPick();
    }, 200);
  });
  input.addEventListener('keydown', e => { if (e.key==='Enter'||e.key==='Escape') input.blur(); });
  return input;
}

// ── LOAD WEEK ─────────────────────────────────────────────────
async function loadCurrentWeek() {
  updateHeaders();
  document.getElementById('loadingOverlay').classList.remove('hidden');
  try {
    const res = await apiGet({ action: 'loadWeek', date: isoDate(currentMonday) });
    scheduleData = res.data.rows || {};
    populateCells();
  } catch(e) {
    showToast('Error loading week', 'error');
  }
  document.getElementById('loadingOverlay').classList.add('hidden');
  setSaveStatus('saved');
}

function updateHeaders() {
  const endSun = new Date(currentMonday); endSun.setDate(endSun.getDate() + 6);
  document.getElementById('weekLabelText').textContent = `${fmtDate(currentMonday)} – ${fmtDate(endSun)}`;
  DAYS.forEach((day, i) => {
    const d = new Date(currentMonday); d.setDate(d.getDate() + i);
    const tod = isToday(d);
    const dateTh = document.querySelector(`.date-th[data-day="${day}"]`);
    if (dateTh) { dateTh.textContent = fmtShort(d); dateTh.classList.toggle('today-col', tod); }
    const hTh = document.getElementById('h-' + day);
    if (hTh) hTh.classList.toggle('today-col', tod);
    document.querySelectorAll(`td.col-day[data-day="${day}"]`).forEach(td => td.classList.toggle('today-col', tod));
  });
}

function populateCells() {
  document.querySelectorAll('.cell-input').forEach(input => {
    const val = (scheduleData[input.dataset.auditor]?.[input.dataset.day]) || '';
    input.value = val; styleInput(input, val);
  });
}

function styleInput(input, val) {
  input.classList.remove('status-off','status-office','status-custom');
  if      (val==='OFF')    input.classList.add('status-off');
  else if (val==='OFFICE') input.classList.add('status-office');
  else if (val)            input.classList.add('status-custom');
}

// ── AUTO-SAVE ─────────────────────────────────────────────────
function commitCell(auditor, day, val, input) {
  if (!scheduleData[auditor]) scheduleData[auditor] = {};
  const prev = scheduleData[auditor][day] || '';
  if (val === prev) return;
  scheduleData[auditor][day] = val;
  styleInput(input, val);
  setSaveStatus('saving');
  apiGet({ action: 'saveCell', date: isoDate(currentMonday), auditor, day, value: val })
    .then(() => setSaveStatus('saved'))
    .catch(() => { setSaveStatus('error'); showToast('Save failed', 'error'); });
}

// ── QUICK PICK ────────────────────────────────────────────────
function openQuickPick(input, el, auditor, day) {
  activeCell = { auditor, day, input };
  const qp = document.getElementById('quickPick');
  const rect = el.getBoundingClientRect();
  let top = rect.bottom + 6;
  if (top + 200 > window.innerHeight) top = rect.top - 200;
  qp.style.top  = Math.max(8, top) + 'px';
  qp.style.left = Math.min(rect.left, window.innerWidth - 155) + 'px';
  qp.classList.add('visible');
}
function closeQuickPick() { document.getElementById('quickPick').classList.remove('visible'); }
function setStatus(val) {
  if (!activeCell) return;
  activeCell.input.value = val;
  closeQuickPick();
  activeCell.input.blur();
}
document.addEventListener('click', e => {
  const qp = document.getElementById('quickPick');
  if (!qp.contains(e.target) && !e.target.classList.contains('cell-input')) closeQuickPick();
});

// ── WEEK NAV ─────────────────────────────────────────────────
function changeWeek(dir) {
  currentMonday = new Date(currentMonday);
  currentMonday.setDate(currentMonday.getDate() + dir * 7);
  loadCurrentWeek();
}
function goToToday() {
  currentMonday = getThisMonday(new Date());
  loadCurrentWeek();
}

// ── SAVE STATUS ───────────────────────────────────────────────
function setSaveStatus(state) {
  const dot = document.getElementById('saveDot');
  const txt = document.getElementById('saveText');
  dot.className = 'save-dot ' + state;
  txt.textContent = state==='saving' ? 'Saving…' : state==='saved' ? 'Saved' : 'Error';
}

// ── CALENDAR ─────────────────────────────────────────────────
function openCalendar() {
  calViewYear = currentMonday.getFullYear();
  calViewMonth = currentMonday.getMonth();
  calSelectedDate = new Date(currentMonday);
  renderCalendar();
  document.getElementById('calModal').classList.add('open');
}
function closeCalendar() { document.getElementById('calModal').classList.remove('open'); }
function handleModalClick(e) { if (e.target===document.getElementById('calModal')) closeCalendar(); }
function calChangeMonth(dir) {
  calViewMonth += dir;
  if (calViewMonth>11) { calViewMonth=0; calViewYear++; }
  if (calViewMonth<0)  { calViewMonth=11; calViewYear--; }
  renderCalendar();
}
function renderCalendar() {
  document.getElementById('calMonthLabel').textContent = MONTHS[calViewMonth] + ' ' + calViewYear;
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d => {
    const el = document.createElement('div'); el.className='cal-day-label'; el.textContent=d; grid.appendChild(el);
  });
  const first = new Date(calViewYear, calViewMonth, 1);
  const daysInMonth = new Date(calViewYear, calViewMonth+1, 0).getDate();
  const today = new Date();
  const selMon = calSelectedDate ? getThisMonday(calSelectedDate) : null;
  const selSun = selMon ? new Date(selMon.getTime()+6*86400000) : null;
  for (let i=0; i<first.getDay(); i++) {
    const el=document.createElement('div'); el.className='cal-day empty'; grid.appendChild(el);
  }
  for (let d=1; d<=daysInMonth; d++) {
    const date = new Date(calViewYear, calViewMonth, d);
    const el = document.createElement('div'); el.className='cal-day'; el.textContent=d;
    if (date.toDateString()===today.toDateString()) el.classList.add('today');
    if (selMon && date>=selMon && date<=selSun) el.classList.add('in-week');
    el.addEventListener('click', () => {
      calSelectedDate=date;
      document.getElementById('calApply').disabled=false;
      renderCalendar();
    });
    grid.appendChild(el);
  }
}
function applyCalendar() {
  if (!calSelectedDate) return;
  currentMonday = getThisMonday(calSelectedDate);
  closeCalendar();
  loadCurrentWeek();
}

// ── THEME ────────────────────────────────────────────────────
function setTheme(theme) {
  document.body.classList.toggle('light', theme==='light');
  document.getElementById('btnLight').classList.toggle('active', theme==='light');
  document.getElementById('btnDark').classList.toggle('active', theme==='dark');
  localStorage.setItem('scheduleTheme', theme);
}

// ── TOAST ────────────────────────────────────────────────────
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}
</script>
